# VoiceIM
# IM 语音消息功能：录制、发送、播放、进度控制、未读提醒
# Swift 6.0 · UIKit · iOS 13.0+
name: VoiceIM

schemes:
  VoiceIM:
    build:
      targets:
        VoiceIM: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VoiceIMTests

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_STRICT_OBJC_MSGSEND: YES

packages:
  # 官方 SPM；若需 SQLCipher，可改回本地 path: Vendor/GRDB.swift 并按文档编译加密变体
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.3"

targets:
  VoiceIM:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: VoiceIM
        excludes:
          - "**/*.md"
    info:
      path: VoiceIM/Info.plist
      properties:
        NSMicrophoneUsageDescription: "需要麦克风权限以录制语音消息"
        NSPhotoLibraryUsageDescription: "需要访问相册以选择和发送图片、视频"
        NSCameraUsageDescription: "需要访问相机以拍摄照片和视频"
        NSLocationWhenInUseUsageDescription: "需要访问位置以发送位置消息"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UILaunchStoryboardName: "Launch Screen"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.VoiceIM
        INFOPLIST_FILE: VoiceIM/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        # 使用 SPM 默认 GRDB（内置系统 SQLite）时不定义 SQLITE_HAS_CODEC。
        # 接入 SQLCipher 本地包时，在此加入：SQLITE_HAS_CODEC
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
    dependencies:
      - package: GRDB
        product: GRDB

  VoiceIMTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: VoiceIMTests
    dependencies:
      - target: VoiceIM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.VoiceIMTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VoiceIM.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VoiceIM"
